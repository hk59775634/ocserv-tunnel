# ocserv.d 片段 — VPN 平台 Route B（多租户 POP）
# 在主 ocserv.conf 中引用：include = /etc/ocserv/ocserv.d/vpn-platform.conf

# 等价 ASAv group-url：https://{pop域名}/{access_key}
select-group-by-url = true
auto-select-group = true
config-per-group = /etc/ocserv/config-per-group/

# RADIUS 认证 — groupconfig=true 与 config-per-group 互斥（ocserv 上游限制）
# 会话策略由 RADIUS Filter-Id 等单独验证；各组占位文件由 pop-api 写入
auth = "radius[config=/etc/radcli/radiusclient.conf,nas-identifier=pop-default]"

# 可选：使用同一 radcli 配置做计费
# acct = "radius[config=/etc/radcli/radiusclient.conf,nas-identifier=pop-default]"

# URL 无路径段时的默认组（生产环境通常关闭）
# default-select-group = default
