# ocserv.d snippet — VPN platform Route B (multi-tenant POP)
# Include from main ocserv.conf: include = /etc/ocserv/ocserv.d/vpn-platform.conf

# ASAv group-url equivalent: https://{pop_domain}/{access_key}
select-group-by-url = true
auto-select-group = true
config-per-group = /etc/ocserv/config-per-group/

# RADIUS auth — groupconfig=true incompatible with config-per-group (ocserv upstream)
# Session policy from RADIUS Filter-Id etc. validated separately; per-group files from pop-api
auth = "radius[config=/etc/radcli/radiusclient.conf,nas-identifier=pop-default]"

# Optional: accounting on same radcli config
# acct = "radius[config=/etc/radcli/radiusclient.conf,nas-identifier=pop-default]"

# Default group when URL has no path segment (usually disabled in production)
# default-select-group = default
